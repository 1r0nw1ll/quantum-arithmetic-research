# GitHub Pages Configuration for QA Research Digital Garden

title: "Quantum Arithmetic Research"
description: "A discrete modular framework that finds structure where continuous methods see noise"
author: "Will Dale"

# Theme
theme: jekyll-theme-cayman

# Build settings
markdown: kramdown
highlighter: rouge

# Navigation
navigation:
  - title: Home
    url: /
  - title: Getting Started
    url: /quickstart
  - title: Demos
    url: /demos
  - title: Certificate Families
    url: /certificates
  - title: Experiments
    url: /experiments/RUNNING_EXPERIMENTS
  - title: GitHub
    url: https://github.com/1r0nw1ll/quantum-arithmetic-research

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - Google AI Studio
  - ai_chats

# Plugins
plugins:
  - jekyll-relative-links
  - jekyll-seo-tag
  - jekyll-sitemap

# SEO
lang: en
twitter:
  card: summary
social:
  name: Will Dale
  links:
    - https://github.com/1r0nw1ll/quantum-arithmetic-research
