\* Same wrapper as QACertificateSpine_check.cfg, but only checks
\* Inv_NoSilentFailures. TLC reports only the first violating invariant
\* per run; isolating each invariant lets us record both counterexamples
\* predicted by the FailureFirstClass theorem analysis.

CONSTANTS
  States = {s1, s2}
  Actions = {a1}
  TargetClasses = {t1}
  Variables = {v1}
  MaxHorizon = 3
  NULL = "NULL"

INIT Init
NEXT Next

INVARIANT Inv_NoSilentFailures
