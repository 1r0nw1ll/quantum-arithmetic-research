\* TLC constants for QACertificateSpine_check.
\* QACertificateSpine's CONSTANTS are instantiated with small finite sets.
\* The wrapper itself doesn't use these in reachable-state enumeration
\* (cert is the only VARIABLE), but TLC still needs concrete bindings for
\* the CONSTANTS to parse the base module.

CONSTANTS
  States = {s1, s2}
  Actions = {a1}
  TargetClasses = {t1}
  Variables = {v1}
  MaxHorizon = 3
  NULL = "NULL"

INIT Init
NEXT Next

INVARIANTS
  Inv_NoSilentFailures
  Inv_ObstructionHasWitness
