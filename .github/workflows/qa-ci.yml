name: QA CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: qa-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa-clean-tree-meta-validator:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path sanity (repo root)
        run: |
          pwd
          ls -la
          test -f tools/qa_latex_claim_linter.py
          test -f qa_alphageometry_ptolemy/qa_meta_validator.py
          test -d papers
          if [ -n "$(git status --porcelain)" ]; then
            echo "Expected clean checkout but found changes:"
            git status --porcelain
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Fetch MNIST raw files for Level-3 recompute
        run: |
          mkdir -p data/MNIST/raw
          python - <<'PY'
          from pathlib import Path
          from urllib.request import urlretrieve

          base = "https://storage.googleapis.com/cvdf-datasets/mnist/"
          files = [
              "train-images-idx3-ubyte.gz",
              "train-labels-idx1-ubyte.gz",
              "t10k-images-idx3-ubyte.gz",
              "t10k-labels-idx1-ubyte.gz",
          ]

          out_dir = Path("data/MNIST/raw")
          out_dir.mkdir(parents=True, exist_ok=True)

          for filename in files:
              target = out_dir / filename
              if target.exists():
                  continue
              urlretrieve(base + filename, target)
          PY

      - name: Run QA meta-validator in clean archive tree
        env:
          QA_MATH_COMPILER_CERTIFICATE_ONLY: "1"
        run: |
          tmp_dir="$(mktemp -d)"
          git archive HEAD | tar -x -C "$tmp_dir"
          mkdir -p "$tmp_dir/data/MNIST/raw"
          cp data/MNIST/raw/*.gz "$tmp_dir/data/MNIST/raw/"
          cd "$tmp_dir/qa_alphageometry_ptolemy"
          python qa_meta_validator.py

  qa-axiom-compliance:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: QA Axiom Compliance Gate
        run: |
          python tools/qa_axiom_linter.py --all
          exit_code=$?
          if [ $exit_code -eq 1 ]; then
            echo ""
            echo "AXIOM GATE FAILED — commit contains QA axiom violations."
            echo "Authority: docs/specs/QA_OBSERVER_PROJECTION_COMPLIANCE_SPEC.v1.md"
            exit 1
          fi

  qa-pim-graph-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run PIM + Graph unit tests
        working-directory: qa_lab
        run: python -m pytest qa_pim/tests qa_graph/tests -v

  qa-validators:
    needs: [qa-clean-tree-meta-validator, qa-axiom-compliance]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: qa_alphageometry_ptolemy

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Path sanity (repo root)
        working-directory: .
        run: |
          pwd
          ls -la
          test -f tools/qa_latex_claim_linter.py
          test -f qa_alphageometry_ptolemy/qa_meta_validator.py
          test -d papers
          if [ -n "$(git status --porcelain)" ]; then
            echo "Expected clean checkout but found changes:"
            git status --porcelain
            exit 1
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r ../requirements-dev.txt

      - name: Fetch MNIST raw files for Level-3 recompute
        run: |
          mkdir -p ../data/MNIST/raw
          python - <<'PY'
          from pathlib import Path
          from urllib.request import urlretrieve

          base = "https://storage.googleapis.com/cvdf-datasets/mnist/"
          files = [
              "train-images-idx3-ubyte.gz",
              "train-labels-idx1-ubyte.gz",
              "t10k-images-idx3-ubyte.gz",
              "t10k-labels-idx1-ubyte.gz",
          ]

          out_dir = Path("../data/MNIST/raw")
          out_dir.mkdir(parents=True, exist_ok=True)

          for filename in files:
              target = out_dir / filename
              if target.exists():
                  continue
              urlretrieve(base + filename, target)
          PY

      - name: Run QA meta-validator (tetrad + conjectures + FST)
        env:
          QA_MATH_COMPILER_CERTIFICATE_ONLY: "1"
        run: python qa_meta_validator.py

      - name: Run conjecture core checks
        run: python qa_conjecture_core.py

      - name: Run FST validator checks
        run: python qa_fst/qa_fst_validate.py

      - name: Run Agent Security Kernel self-tests
        working-directory: .
        run: python qa_agent_security/qa_agent_security.py

      - name: Run Tool Runner self-tests
        working-directory: .
        run: python -m qa_agent_security.tool_runner

      - name: Run Agent Security Kernel pytest suite
        working-directory: .
        run: python -m pytest qa_agent_security/tests/ -q --override-ini="testpaths=qa_agent_security/tests" --override-ini="python_files=test_*.py"

      - name: Run QA Probes (certified obstruction theorems)
        working-directory: .
        run: python -m pytest qa_probes/ -v --override-ini="testpaths=qa_probes" --override-ini="python_files=test_*.py"

      - name: Run Core System Stack validator
        run: python certs/qa_core_stack_validate.py

      - name: LaTeX claim linter — broad scan (informational)
        continue-on-error: true
        working-directory: .
        run: python3 tools/qa_latex_claim_linter.py papers/ --json

      - name: LaTeX claim linter — strict pre-submission check (PAC-Bayes workspace)
        working-directory: .
        run: python3 tools/qa_latex_claim_linter.py papers/in-progress/phase1-pac-bayes/phase1_workspace --strict

      - name: LaTeX claim linter regression tests
        working-directory: .
        run: python tools/tests/test_latex_claim_linter.py

      - name: Spine integrity sweep ([76]+[80]+[86] self-tests)
        working-directory: .
        run: |
          if [ -f qa_failure_algebra_structure_cert_v1/validator.py ]; then
            python3 qa_failure_algebra_structure_cert_v1/validator.py --self-test
          else
            echo "[SKIP] qa_failure_algebra_structure_cert_v1/validator.py not present in this checkout"
          fi
          if [ -f qa_energy_cert_v1_1/validator.py ]; then
            python3 qa_energy_cert_v1_1/validator.py --self-test
          else
            echo "[SKIP] qa_energy_cert_v1_1/validator.py not present in this checkout"
          fi
          if [ -f qa_generator_failure_unification_cert_v1/validator.py ]; then
            python3 qa_generator_failure_unification_cert_v1/validator.py --self-test
          else
            echo "[SKIP] qa_generator_failure_unification_cert_v1/validator.py not present in this checkout"
          fi

  qa-math-compiler-live-kernels:
    runs-on: macos-14
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned proof-assistant toolchains
        run: tools/install_math_compiler_toolchains.sh

      - name: Regenerate live-kernel certificate
        run: |
          python3 qa_alphageometry_ptolemy/qa_math_compiler/verify_live_kernels.py --write-report
          git diff --exit-code -- qa_alphageometry_ptolemy/qa_math_compiler/artifacts/live_kernel_certificate.v1.json

      - name: Replay kernel-derived proof traces
        run: |
          python3 qa_alphageometry_ptolemy/qa_math_compiler/compile_kernel_traces.py
          python3 qa_alphageometry_ptolemy/qa_math_compiler/compile_kernel_traces.py --check-semantic-certificate

      - name: Validate committed certificate
        run: python3 qa_alphageometry_ptolemy/qa_math_compiler/verify_live_kernels.py --check-report

      - name: Verify Darwin supply-chain receipt
        run: python3 qa_alphageometry_ptolemy/qa_math_compiler/build_supply_chain_manifest.py check

  qa-math-compiler-linux-parity:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        runner:
          - runner-a
          - runner-b

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pinned Lean toolchain
        run: tools/install_lean_toolchain.sh

      - name: Replay compressed lemma-mining proofs
        run: python3 qa_alphageometry_ptolemy/qa_math_compiler/evaluate_lemma_mining.py check

      - name: Verify portable supply-chain root
        run: python3 qa_alphageometry_ptolemy/qa_math_compiler/build_supply_chain_manifest.py check-portable

      - name: Build independent runner receipt
        run: |
          python3 qa_alphageometry_ptolemy/qa_math_compiler/build_runner_parity_receipt.py \
            build \
            --live-replay \
            --output "/tmp/math-compiler-parity-${{ matrix.runner }}.json"

      - name: Upload independent runner receipt
        uses: actions/upload-artifact@v4
        with:
          name: qa-math-compiler-parity-${{ matrix.runner }}
          path: /tmp/math-compiler-parity-${{ matrix.runner }}.json
          if-no-files-found: error
          retention-days: 7

  qa-math-compiler-two-runner-parity:
    runs-on: ubuntu-latest
    needs:
      - qa-math-compiler-linux-parity
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Download independent runner receipts
        uses: actions/download-artifact@v4
        with:
          pattern: qa-math-compiler-parity-*
          path: /tmp/math-compiler-parity
          merge-multiple: true

      - name: Require byte-identical independent receipts
        run: |
          python3 qa_alphageometry_ptolemy/qa_math_compiler/build_runner_parity_receipt.py \
            compare \
            /tmp/math-compiler-parity/math-compiler-parity-runner-a.json \
            /tmp/math-compiler-parity/math-compiler-parity-runner-b.json
