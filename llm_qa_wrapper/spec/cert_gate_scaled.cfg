\* Scaled TLC config: larger parameter set to test whether invariants
\* still hold under more diverse trace patterns.

SPECIFICATION Spec

CONSTANTS
    Agents = {a1, a2}
    Tools = {t1, t2}
    Payloads = {p1, p2}
    MaxLedgerDepth = 4

SYMMETRY AgentSymmetry

CONSTRAINT StateBound

INVARIANTS
    TypeOK
    Inv_NoExecWithoutCert
    Inv_LedgerChainValid
    Inv_CertBindsPayload
    Inv_NoDoubleExec
    Inv_Composition
